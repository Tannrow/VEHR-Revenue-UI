name: Frontend Playwright

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-playwright.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm --prefix frontend ci

      - name: Revenue command tripwire
        run: npm --prefix frontend run test:revenue-tripwire

      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm --prefix frontend run test:e2e
