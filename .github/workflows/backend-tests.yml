name: Backend Tests (Postgres)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vehr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vehr_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/vehr_test
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate DATABASE_URL
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "DATABASE_URL is required" >&2
            exit 1
          fi
          if [[ "${DATABASE_URL}" != postgresql+psycopg://* ]]; then
            echo "DATABASE_URL must start with postgresql+psycopg:// (Postgres-only enforcement)" >&2
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f "requirements.txt" ]]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found at repo root. Update workflow to install backend deps correctly." >&2
            exit 1
          fi
          pip install "psycopg[binary]" pytest alembic

      - name: Wait for Postgres
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if python - <<'PY'
import os
import psycopg
psycopg.connect(os.environ["DATABASE_URL"]).close()
print("ok")
PY
            then
              exit 0
            fi
            echo "Postgres not ready yet... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Run Alembic migrations (upgrade)
        shell: bash
        run: |
          set -euo pipefail
          alembic upgrade head

      - name: Run Alembic migrations (downgrade -> upgrade)
        shell: bash
        run: |
          set -euo pipefail
          # If your project does not support full downgrades, you can remove this step.
          alembic downgrade base
          alembic upgrade head

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
