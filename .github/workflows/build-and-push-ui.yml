name: Build and Push UI Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: vehrrevostagingacr
  ACR_LOGIN_SERVER: vehrrevostagingacr.azurecr.io
  IMAGE_NAME: vehr-revenue-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Determine Azure authentication mode
        id: azure-auth
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "$AZURE_CREDENTIALS" ]; then
            echo "mode=service-principal" >> "$GITHUB_OUTPUT"
          else
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login with OIDC
        if: ${{ steps.azure-auth.outputs.mode == 'oidc' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure login with service principal secret
        if: ${{ steps.azure-auth.outputs.mode == 'service-principal' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        if: ${{ steps.azure-auth.outputs.mode != 'skip' }}
        run: az acr login --name "$ACR_NAME"

      - name: Compute image reference
        id: image
        run: |
          tag="${GITHUB_SHA::7}"
          image_ref="$ACR_LOGIN_SERVER/$IMAGE_NAME:$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build --tag "${{ steps.image.outputs.image_ref }}" .

      - name: Push Docker image
        if: ${{ steps.azure-auth.outputs.mode != 'skip' }}
        run: docker push "${{ steps.image.outputs.image_ref }}"

      - name: Publish image reference
        run: |
          echo "Built image: ${{ steps.image.outputs.image_ref }}"
          if [ "${{ steps.azure-auth.outputs.mode }}" = "skip" ]; then
            {
              echo "## UI image build completed"
              echo
              echo "- Workflow: Build and Push UI Image"
              echo "- Image tag format: short git SHA (7 characters)"
              echo "- Built image: \`${{ steps.image.outputs.image_ref }}\`"
              echo "- Push skipped: configure Azure OIDC secrets or \`AZURE_CREDENTIALS\` to publish to ACR."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## UI image published"
              echo
              echo "- Workflow: Build and Push UI Image"
              echo "- Image tag format: short git SHA (7 characters)"
              echo "- Image: \`${{ steps.image.outputs.image_ref }}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
