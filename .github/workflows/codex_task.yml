name: Codex Task

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to use as Codex task"
        required: true
      risk:
        description: "Risk level"
        required: false
        default: "low"

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  codex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch issue body
        id: issue
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ.get('GITHUB_REPOSITORY')
          issue_number = os.environ.get('ISSUE_NUMBER')
          token = os.environ.get('GITHUB_TOKEN')
          if not repo or not issue_number or not token:
            sys.exit('Missing repository, issue number, or token')

          url = f"https://api.github.com/repos/{repo}/issues/{issue_number}"
          req = urllib.request.Request(url)
          req.add_header('Authorization', f'Bearer {token}')
          req.add_header('Accept', 'application/vnd.github+json')
          req.add_header('X-GitHub-Api-Version', '2022-11-28')

          with urllib.request.urlopen(req) as response:
            body = response.read().decode('utf-8')
            data = json.loads(body)

          issue_body = data.get('body') or ''
          with open('/tmp/issue_body.txt', 'w', encoding='utf-8') as handle:
            handle.write(issue_body)
          PY

      - name: Run Codex
        id: codex
        uses: openai/codex-action@v1
        with:
          prompt-file: /tmp/issue_body.txt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
