name: Deploy VEHR Revenue OS (Staging)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: vehr-revos-staging-rg
  CONTAINERAPP_NAME: vehr-revos-staging
  MIGRATION_JOB_NAME: vehr-revos-staging-migrate
  ACR_NAME: vehrrevostagingacr
  ACR_LOGIN_SERVER: vehrrevostagingacr.azurecr.io
  IMAGE_NAME: vehr-api
  APP_URL: https://vehr-revos-staging.whitemoss-9930542d.eastus.azurecontainerapps.io

jobs:
  build-and-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Build check
        shell: bash
        run: |
          set -euxo pipefail
          python -m compileall app

      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail
          PYTHONPATH=. pytest -q

  build-and-deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Azure Login (OIDC)
      # -----------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # Verify Azure Context
      # -----------------------------
      - name: Verify Azure context
        shell: bash
        run: |
          set -euxo pipefail
          az account show
          az group show -n $RESOURCE_GROUP -o table

      # -----------------------------
      # Build Image in ACR
      # -----------------------------
      - name: Build and push image to ACR
        shell: bash
        run: |
          set -euxo pipefail
          IMAGE_TAG=${{ github.sha }}
          FULL_IMAGE=$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

          echo "Building image: $FULL_IMAGE"

          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:$IMAGE_TAG \
            .

          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV

      # -----------------------------
      # Run migrations via ACA Job
      # -----------------------------
      - name: Run migration job and wait
        shell: bash
        run: |
          set -euxo pipefail
          ENVIRONMENT_ID="$(az containerapp show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.managedEnvironmentId" \
            -o tsv)"

          if az containerapp job show \
            --name "$MIGRATION_JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            >/dev/null 2>&1; then
            az containerapp job update \
              --name "$MIGRATION_JOB_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$FULL_IMAGE" \
              --command alembic upgrade head
          else
            az containerapp job create \
              --name "$MIGRATION_JOB_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$ENVIRONMENT_ID" \
              --trigger-type Manual \
              --replica-timeout 1800 \
              --replica-retry-limit 0 \
              --replica-completion-count 1 \
              --parallelism 1 \
              --image "$FULL_IMAGE" \
              --cpu 0.5 \
              --memory 1.0Gi \
              --command alembic upgrade head
          fi

          JOB_EXECUTION_NAME="$(az containerapp job start \
            --name "$MIGRATION_JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$FULL_IMAGE" \
            --query "name" \
            -o tsv)"

          echo "Started migration execution: $JOB_EXECUTION_NAME"
          for i in {1..360}; do
            EXEC_STATUS="$(az containerapp job execution show \
              --name "$MIGRATION_JOB_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --job-execution-name "$JOB_EXECUTION_NAME" \
              --query "properties.status" \
              -o tsv)"

            echo "[$i/360] status=$EXEC_STATUS"
            if [ "$EXEC_STATUS" = "Succeeded" ]; then
              exit 0
            fi
            if [ "$EXEC_STATUS" = "Failed" ]; then
              echo "Migration job failed"
              exit 1
            fi
            sleep 5
          done

          echo "Migration job did not complete in time"
          exit 1

      - name: Deploy safely (0% -> health/smoke -> 100%)
        shell: bash
        run: |
          set -euxo pipefail

          OLD_REVISION="$(az containerapp ingress traffic show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by([?weight > \`0\`].{revisionName:revisionName, weight:weight}, &weight)[-1].revisionName" \
            -o tsv)"

          if [ -z "$OLD_REVISION" ]; then
            OLD_REVISION="$(az containerapp revision list \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "[?properties.active].name | [0]" \
              -o tsv)"
          fi

          if [ -z "$OLD_REVISION" ]; then
            echo "Could not determine old active revision"
            exit 1
          fi

          az containerapp revision set-mode \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --mode multiple

          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$FULL_IMAGE" \
            --set-env-vars RINGCENTRAL_REALTIME_ENABLED=false

          NEW_REVISION="$(az containerapp revision list \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by([].{name:name, created:properties.createdTime}, &created)[-1].name" \
            -o tsv)"

          if [ -z "$NEW_REVISION" ] || [ "$NEW_REVISION" = "$OLD_REVISION" ]; then
            echo "Failed to determine new revision"
            exit 1
          fi

          rollback_and_fail() {
            if ! az containerapp ingress traffic set \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --revision-weight "$OLD_REVISION=100" "$NEW_REVISION=0"; then
              echo "Rollback traffic shift failed" >&2
            fi
            exit 1
          }

          az containerapp ingress traffic set \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision-weight "$OLD_REVISION=100" "$NEW_REVISION=0"

          for i in {1..36}; do
            HEALTH="$(az containerapp revision show \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --revision "$NEW_REVISION" \
              --query "properties.healthState" \
              -o tsv)"

            echo "[$i/36] newRevision=$NEW_REVISION healthState=$HEALTH"
            if [ "$HEALTH" = "Healthy" ]; then
              break
            fi
            sleep 5
            if [ "$i" -eq 36 ]; then
              echo "New revision did not become Healthy in time"
              rollback_and_fail
            fi
          done

          REVISION_FQDN="$(az containerapp revision show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision "$NEW_REVISION" \
            --query "properties.fqdn" \
            -o tsv)"

          if [ -z "$REVISION_FQDN" ]; then
            echo "Could not resolve new revision FQDN"
            rollback_and_fail
          fi

          URL="https://$REVISION_FQDN/api/v1/healthz"
          for i in {1..12}; do
            echo "[$i/12] GET $URL"
            if curl -fsS --max-time 15 "$URL" | grep -q '"ok":true'; then
              az containerapp ingress traffic set \
                --name "$CONTAINERAPP_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --revision-weight "$NEW_REVISION=100" "$OLD_REVISION=0"
              APP_SMOKE_URL="$APP_URL/api/v1/healthz"
              if curl -fsS --max-time 15 "$APP_SMOKE_URL" | grep -q '"ok":true'; then
                echo "Smoke test passed; traffic shifted to new revision"
                exit 0
              fi
              echo "Post-promotion app URL smoke test failed"
              rollback_and_fail
            fi
            sleep 5
          done

          echo "Smoke test failed"
          rollback_and_fail
