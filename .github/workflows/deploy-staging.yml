name: Deploy VEHR Revenue OS (Staging)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: vehr-revos-staging-rg
  CONTAINERAPP_NAME: vehr-revos-staging
  ACR_NAME: vehrrevostagingacr
  ACR_LOGIN_SERVER: vehrrevostagingacr.azurecr.io
  IMAGE_NAME: vehr-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Azure Login (OIDC)
      # -----------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # Verify Azure Context (Debug)
      # -----------------------------
      - name: Verify Azure context
        shell: bash
        run: |
          set -euxo pipefail
          az account show
          az group show -n $RESOURCE_GROUP -o table

      # -----------------------------
      # Build Image in ACR
      # -----------------------------
      - name: Build and push image to ACR
        shell: bash
        run: |
          set -euxo pipefail
          IMAGE_TAG=${{ github.sha }}
          FULL_IMAGE=$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

          echo "Building image: $FULL_IMAGE"

          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:$IMAGE_TAG \
            .

          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV

      # -----------------------------
      # Deploy to Container Apps
      # -----------------------------
      - name: Deploy to Azure Container Apps
        shell: bash
        run: |
          set -euxo pipefail
          az containerapp update \
            --name $CONTAINERAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $FULL_IMAGE

      # -----------------------------
      # Show Latest Revision
      # -----------------------------
      - name: Show latest revision
        shell: bash
        run: |
          set -euxo pipefail
          az containerapp revision list \
            --name $CONTAINERAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            -o table | head -n 20
