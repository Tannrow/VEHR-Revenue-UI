name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME: vehrrevostagingacr
  ACR_LOGIN_SERVER: vehrrevostagingacr.azurecr.io
  IMAGE_NAME: vehr-revenue-ui
  RESOURCE_GROUP: vehr-revos-staging-rg
  CONTAINER_APP_NAME: vehr-revenue-ui-staging-eus2
  HEALTH_CHECK_URL: https://staging.360-encompass.com/api/health

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Compute image reference
        id: image
        run: |
          tag="${GITHUB_SHA::7}"
          image_ref="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${tag}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Obtain ACR access token
        id: acr-token
        run: |
          access_token="$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)"
          echo "::add-mask::$access_token"
          echo "access_token=$access_token" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR with token
        run: |
          echo "${{ steps.acr-token.outputs.access_token }}" | docker login "$ACR_LOGIN_SERVER" \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - name: Build Docker image
        run: docker build --tag "${{ steps.image.outputs.image_ref }}" .

      - name: Push Docker image
        run: docker push "${{ steps.image.outputs.image_ref }}"

      - name: Deploy container app image
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --image "${{ steps.image.outputs.image_ref }}"

      - name: Wait for deployment to settle
        run: sleep 30

      - name: Run post-deploy health check
        run: |
          response_headers="$(mktemp)"
          curl -sS -i --max-time 30 -o /dev/null -D "$response_headers" "$HEALTH_CHECK_URL"
          cat "$response_headers"
          status_code="$(awk 'toupper($1) ~ /^HTTP/ { code=$2 } END { print code }' "$response_headers")"
          if [ "$status_code" != "200" ]; then
            echo "Health check returned HTTP ${status_code:-unknown}" >&2
            exit 1
          fi

      - name: Report deployed image
        run: 'echo "Deployed image: ${{ steps.image.outputs.image_ref }}"'
