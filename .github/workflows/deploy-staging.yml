name: Deploy VEHR Revenue OS (Staging)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: vehr-revos-staging-rg
  CONTAINERAPP_NAME: vehr-revos-staging
  ACR_NAME: vehrrevostagingacr
  ACR_LOGIN_SERVER: vehrrevostagingacr.azurecr.io
  IMAGE_NAME: vehr-api
  APP_URL: https://vehr-revos-staging.whitemoss-9930542d.eastus.azurecontainerapps.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Azure Login (OIDC)
      # -----------------------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # Verify Azure Context
      # -----------------------------
      - name: Verify Azure context
        shell: bash
        run: |
          set -euxo pipefail
          az account show
          az group show -n $RESOURCE_GROUP -o table

      # -----------------------------
      # Build Image in ACR
      # -----------------------------
      - name: Build and push image to ACR
        shell: bash
        run: |
          set -euxo pipefail
          IMAGE_TAG=${{ github.sha }}
          FULL_IMAGE=$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

          echo "Building image: $FULL_IMAGE"

          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:$IMAGE_TAG \
            .

          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV

      # -----------------------------
      # Deploy to Container Apps
      # -----------------------------
      - name: Deploy to Azure Container Apps
        shell: bash
        run: |
          set -euxo pipefail
          az containerapp update \
            --name $CONTAINERAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $FULL_IMAGE \
            --set-env-vars RINGCENTRAL_REALTIME_ENABLED=false

      # -----------------------------
      # Wait for Latest Revision Healthy
      # -----------------------------
      - name: Wait for latest revision healthy
        shell: bash
        run: |
          set -euo pipefail

          REVISION="$(az containerapp revision list \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by([].{name:name, created:properties.createdTime, health:properties.healthState}, &created)[-1].name" \
            -o tsv)"

          echo "Latest revision: $REVISION"

          for i in {1..36}; do
            HEALTH="$(az containerapp revision show \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --revision "$REVISION" \
              --query "properties.healthState" \
              -o tsv)"

            echo "[$i/36] healthState=$HEALTH"

            if [ "$HEALTH" = "Healthy" ]; then
              exit 0
            fi

            sleep 5
          done

          echo "Revision did not become Healthy in time"
          exit 1

      # -----------------------------
      # Smoke Test /healthz
      # -----------------------------
      - name: Smoke test healthz
        shell: bash
        run: |
          set -euo pipefail
          URL="$APP_URL/api/v1/healthz"

          for i in {1..12}; do
            echo "[$i/12] GET $URL"
            if curl -fsS --max-time 15 "$URL" | grep -q '"ok":true'; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 5
          done

          echo "Smoke test failed"
          exit 1
