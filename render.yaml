services:
  - type: web
    name: the-daily-dose-api
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    domains:
      - api.the-trapp-house.com
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: the-daily-dose-db
          property: connectionString
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_USE_PATH_STYLE
        sync: false
      - key: S3_PRESIGN_EXPIRES_SECONDS
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: the-trapp-house-web
    env: node
    plan: starter
    autoDeploy: true
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    domains:
      - the-trapp-house.com
      - www.the-trapp-house.com
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: the-daily-dose-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_API_TOKEN
        sync: false

databases:
  - name: the-daily-dose-db
    plan: starter
    databaseName: the_daily_dose
    user: the_daily_dose_user
