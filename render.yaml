services:
  - type: web
    name: the-daily-dose-api
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    domains:
      - api.the-trapp-house.com
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: the-daily-dose-db
          property: connectionString
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://the-trapp-house.com,https://www.the-trapp-house.com,http://localhost:3000,http://127.0.0.1:3000"
      - key: JWT_SECRET
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        value: vehr-uploads-prod
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_USE_PATH_STYLE
        sync: false
      - key: S3_PRESIGN_EXPIRES_SECONDS
        sync: false
      - key: S3_VALIDATE_ON_STARTUP
        value: "true"

  - type: web
    name: the-trapp-house-web
    env: node
    plan: starter
    autoDeploy: true
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    domains:
      - the-trapp-house.com
      - www.the-trapp-house.com
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://api.the-trapp-house.com
      - key: NEXT_PUBLIC_API_TOKEN
        sync: false

databases:
  - name: the-daily-dose-db
    plan: starter
    databaseName: the_daily_dose
    user: the_daily_dose_user
